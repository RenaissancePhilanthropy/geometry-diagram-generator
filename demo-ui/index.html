<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikZ Diagram Demo</title>
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
      },
      startup: { typeset: false },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #penrose {
      width: 100%;
      max-width: 720px;
    }

    #chat {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .msg {
      max-width: 85%;
      padding: 0.6rem 0.9rem;
      border-radius: 1rem;
      line-height: 1.5;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 0.25rem;
      white-space: pre-wrap;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      color: #111;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 0.25rem;
    }

    /* Markdown content styles for assistant messages */
    .msg.assistant p { margin: 0.25rem 0; }
    .msg.assistant p:first-child { margin-top: 0; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant h1, .msg.assistant h2, .msg.assistant h3,
    .msg.assistant h4, .msg.assistant h5, .msg.assistant h6 {
      margin: 0.75rem 0 0.25rem;
      line-height: 1.3;
    }
    .msg.assistant h1:first-child, .msg.assistant h2:first-child,
    .msg.assistant h3:first-child { margin-top: 0; }
    .msg.assistant ul, .msg.assistant ol {
      margin: 0.25rem 0;
      padding-left: 1.4rem;
    }
    .msg.assistant li { margin: 0.15rem 0; }
    .msg.assistant code {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 0.25rem;
      padding: 0.1em 0.35em;
      font-size: 0.875em;
      font-family: ui-monospace, monospace;
    }
    .msg.assistant pre {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .msg.assistant pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85em;
      color: inherit;
    }
    .msg.assistant blockquote {
      border-left: 3px solid #d1d5db;
      margin: 0.5rem 0;
      padding: 0.1rem 0.75rem;
      color: #6b7280;
    }
    .msg.assistant table {
      border-collapse: collapse;
      margin: 0.5rem 0;
      font-size: 0.9em;
    }
    .msg.assistant th, .msg.assistant td {
      border: 1px solid #e5e7eb;
      padding: 0.35rem 0.6rem;
    }
    .msg.assistant th { background: #f9fafb; font-weight: 600; }
    .msg.assistant a { color: #2563eb; text-decoration: underline; }
    .msg.assistant hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 0.75rem 0;
    }

    .msg.error {
      align-self: center;
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      font-size: 0.85rem;
    }

    .msg.thinking {
      color: #6b7280;
      font-style: italic;
    }

    #input-row {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid #e5e7eb;
      background: #f5f5f5;
    }

    #input-row textarea {
      flex: 1;
      resize: none;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.5;
      min-height: 2.5rem;
      max-height: 8rem;
      overflow-y: auto;
      outline: none;
    }

    #input-row textarea:focus {
      border-color: #2563eb;
    }

    #input-row button {
      padding: 0 1.1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      height: 2.5rem;
    }

    #input-row button:hover:not(:disabled) { background: #1d4ed8; }
    #input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="penrose"></div>
  <div id="chat"></div>
  <div id="input-row">
    <textarea id="input" placeholder="Message…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
