<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikZ Diagram Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #penrose {
      width: 100%;
      max-width: 720px;
    }

    #chat {
      width: 100%;
      max-width: 720px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .msg {
      max-width: 85%;
      padding: 0.6rem 0.9rem;
      border-radius: 1rem;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #fff;
      color: #111;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 0.25rem;
    }

    .msg.error {
      align-self: center;
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      font-size: 0.85rem;
    }

    .msg.thinking {
      color: #6b7280;
      font-style: italic;
    }

    #input-row {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid #e5e7eb;
      background: #f5f5f5;
    }

    #input-row textarea {
      flex: 1;
      resize: none;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.5;
      min-height: 2.5rem;
      max-height: 8rem;
      overflow-y: auto;
      outline: none;
    }

    #input-row textarea:focus {
      border-color: #2563eb;
    }

    #input-row button {
      padding: 0 1.1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      height: 2.5rem;
    }

    #input-row button:hover:not(:disabled) { background: #1d4ed8; }
    #input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="penrose"></div>
  <div id="chat"></div>
  <div id="input-row">
    <textarea id="input" placeholder="Message…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
