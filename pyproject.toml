[project]
name = "geometry-tikz-demo"
version = "0.1.0"
description = "Generate geometry diagrams in TikZ using LLMs."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic==0.84.0",
    "cairosvg>=2.8.2",
    "httpx>=0.27",
    "matplotlib>=3.10.9",
    "pydantic-ai-slim[ag-ui,anthropic,google,openai,web,ag-ui]>=1.66.0",
    "python-dotenv>=1.2.2",
    "pyyaml>=6.0.3",
    "sympy>=1.14.0",
]

[dependency-groups]
dev = [
    "mlcroissant>=1.1.0",
    "pymupdf>=1.27.2.2",
    "pytest>=9.0.2",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
