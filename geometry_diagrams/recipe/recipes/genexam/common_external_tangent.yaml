name: common_external_tangent
description: "Two circles of different radii connected by their common external tangent lines"
tags: [circle, tangent, external, homothety, advanced]
context: "Given two circles c1 and c2 with different radii and their common external tangents."
setup:
  - op: point
    id: O1
    coords: [0, 0]
  - op: point
    id: O2
    coords: [6, 0]
  - op: circle
    id: c1
    center: O1
    radius: 3
  - op: circle
    id: c2
    center: O2
    radius: 1
  - op: point
    id: E
    coords: [9, 0]
    visible: false
example:
  mode: grid
  construction:
    - op: tangent_line
      id: tang_upper
      circle: c1
      from_point: E
      selector:
        kind: upper_of_line
        a: O1
        b: O2
      visible: false
    - op: intersection
      id: T1
      of: [tang_upper, c1]
      selector:
        kind: upper_of_line
        a: O1
        b: O2
    - op: intersection
      id: T2
      of: [tang_upper, c2]
      selector:
        kind: upper_of_line
        a: O1
        b: O2
    - op: segment
      id: seg_upper
      endpoints: [T1, T2]
    - op: tangent_line
      id: tang_lower
      circle: c1
      from_point: E
      selector:
        kind: lower_of_line
        a: O1
        b: O2
      visible: false
    - op: intersection
      id: T3
      of: [tang_lower, c1]
      selector:
        kind: lower_of_line
        a: O1
        b: O2
    - op: intersection
      id: T4
      of: [tang_lower, c2]
      selector:
        kind: lower_of_line
        a: O1
        b: O2
    - op: segment
      id: seg_lower
      endpoints: [T3, T4]
  annotations:
    auto_draw_all: true
    auto_label_points: true
notes:
  - "E is the external center of similitude: E = O1 + r1/(r1-r2) * (O2-O1). For r1=3, r2=1, |O1O2|=6: E = (9,0). Place E explicitly as a point op."
  - "CRITICAL: use tangent_line from E to c1 only. Then intersect that SAME line with c2 to get T2 — do NOT create a separate tangent_line from E to c2. The tangent from E touches both circles simultaneously."
  - "Use upper_of_line / lower_of_line selectors with O1 and O2 as reference to disambiguate the two tangent lines and their intersection points."
  - "For equal radii (r1 = r2): external tangents are parallel; there is no finite center of similitude. Use a different construction (perpendicular from center + offset)."
  - "Mark E as visible: false if it should not appear as a labeled point in the diagram."
  - "Internal tangents (crossing between the circles) use the internal center of similitude instead: I = O1 + r1/(r1+r2) * (O2-O1)."
