name: bridge_indirect_measurement
description: "SAS indirect measurement ‚Äî vertical angles at A prove ‚ñ≥CAB ‚âÖ ‚ñ≥DAE, so DE = BC"
tags: [triangle, congruence, sas, vertical-angles, indirect-measurement, intermediate]
context: "River-crossing SAS congruence diagram. A is on the top bank at the river edge."
setup: []
example:
  mode: grid
  construction:
    # Bank guide lines (visual only)
    - op: point
      id: bank_top_L
      coords: [-4, 2]
      visible: false
    - op: point
      id: bank_top_R
      coords: [4, 2]
      visible: false
    - op: point
      id: bank_bot_L
      coords: [-4, 0]
      visible: false
    - op: point
      id: bank_bot_R
      coords: [4, 0]
      visible: false
    - op: segment
      id: top_bank
      endpoints: [bank_top_L, bank_top_R]
    - op: segment
      id: bot_bank
      endpoints: [bank_bot_L, bank_bot_R]
    # Key points ‚Äî geometry explanation:
    #   Direction CA = A - C = (0,2)-(-2,0) = (2,2). D = A + (2,2) = (2,4). So C,A,D are collinear.
    #   Direction BA = A - B = (0,2)-(3,4) = (-3,-2). E = A + (-3,-2) = (-3,0). So B,A,E are collinear.
    #   CA = DA = 2‚àö2, AB = AE = ‚àö13. Vertical angles ‚àÝCAB = ‚àÝDAE ‚Üí SAS ‚Üí ‚ñ≥CAB ‚âÖ ‚ñ≥DAE ‚Üí DE = BC.
    - op: point
      id: A
      coords: [0, 2]
    - op: point
      id: B
      coords: [3, 4]
    - op: point
      id: C
      coords: [-2, 0]
    - op: point
      id: D
      coords: [2, 4]
    - op: point
      id: E
      coords: [-3, 0]
    # C-A-D straight line (extension of CA past A)
    - op: segment
      id: seg_CD_thru_A
      endpoints: [C, D]
    # B-A-E straight line (extension of BA past A)
    - op: segment
      id: seg_BE_thru_A
      endpoints: [B, E]
    # The inaccessible side BC and the measurable copy DE
    - op: segment
      id: seg_BC
      endpoints: [B, C]
    - op: segment
      id: seg_DE
      endpoints: [D, E]
  annotations:
    auto_draw_all: true
    auto_label_points: true
    marks:
      # CA = DA (tick group 1) ‚Äî constructed equal by measurement
      - kind: mark_equal_lengths
        segments: [[C, A], [D, A]]
        group: 1
      # AB = AE (tick group 2) ‚Äî constructed equal by measurement
      - kind: mark_equal_lengths
        segments: [[A, B], [A, E]]
        group: 2
      # Vertical angles at A: ‚àÝCAB = ‚àÝDAE (arc group 1)
      - kind: mark_angle
        a: C
        vertex: A
        b: B
        group: 1
      - kind: mark_angle
        a: D
        vertex: A
        b: E
        group: 1
notes:
  - "GEOMETRY: C,A,D are collinear (D = A + (A‚àíC) = extension past A). B,A,E are collinear (E = A + (A‚àíB) = extension past A)."
  - "Coordinates: A=(0,2), B=(3,4), C=(‚àí2,0), D=(2,4), E=(‚àí3,0)."
  - "CA=DA=2‚àö2, AB=AE=‚àö13. Vertical angles ‚àÝCAB=‚àÝDAE (since C-A-D and B-A-E are straight lines through A). SAS ‚Üí DE=BC."
  - "B and D are both at y=4 (inland). C and E are both at y=0 (bottom bank). A=(0,2) is at the top bank river edge."
  - "mark_angle(C, A, B) and mark_angle(D, A, E): arm points C,B and D,E are the correct non-collinear arm endpoints."
  - "DO NOT use mark_right_angle ‚Äî angle CAB is NOT 90¬∞."
  - "DO NOT place C directly below A (same x) ‚Äî that makes CA vertical and D lands above the top bank, breaking the geometry."
  - "DO NOT make AB horizontal ‚Äî that makes E land on the top bank instead of the bottom bank."
