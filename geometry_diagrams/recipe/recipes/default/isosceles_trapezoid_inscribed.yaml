name: isosceles_trapezoid_inscribed
description: "Isosceles trapezoid with all four vertices on a circle, constructed via reflection over the circle's vertical axis of symmetry"
tags: [circle, polygon, quadrilateral, parallel, symmetric, intermediate]
context: "Given a circle with center O."
setup:
  - op: point
    id: O
    coords: [0, 0]
  - op: circle
    id: circ
    center: O
    radius: 3
example:
  mode: grid
  construction:
    - op: point
      id: ax_lo
      coords: [0, -1]
      visible: false
    - op: point
      id: ax_hi
      coords: [0, 1]
      visible: false
    - op: line_through
      id: axis
      points: [ax_lo, ax_hi]
      visible: false
    - op: point
      id: A
      coords: [-2.4, -1.8]
    - op: reflection
      id: B
      point: A
      over: axis
    - op: point
      id: D
      coords: [-1.5, 2.598]
    - op: reflection
      id: C
      point: D
      over: axis
    - op: polygon
      id: trap
      vertices: [A, B, C, D]
  annotations:
    auto_draw_all: true
    auto_label_points: true
notes:
  - "Define the vertical axis of symmetry through O using two hidden helper points (visible: false) and a line_through — the axis line itself should also be visible: false"
  - "Place A on the circle (lower-left): coords must satisfy x²+y²=radius². Example for radius 3: (-2.4,-1.8) since 2.4²+1.8²=9"
  - "B = reflection of A over the axis → B is the mirror of A (lower-right), so AB is horizontal and both A,B are on the circle"
  - "Place D on the circle (upper-left): same constraint x²+y²=radius². Example: (-1.5, 2.598) since 1.5²+2.598²≈9"
  - "C = reflection of D over the axis → CD is horizontal and both C,D are on the circle"
  - "AB ∥ CD because both are perpendicular to the vertical axis; AD = BC because reflection is an isometry"
  - "Vertex order A (lower-left), B (lower-right), C (upper-right), D (upper-left) goes around the shape"
  - "O is the circle center — always place it at (0,0) and build the axis through it"
