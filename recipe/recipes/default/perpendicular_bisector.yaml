name: perpendicular_bisector
description: "Line perpendicular to a segment at its midpoint, with optional right-angle mark"
tags: [perpendicular, midpoint, segment, basic]
context: "Given a segment AB, construct its perpendicular bisector through midpoint M."
setup:
  - op: point
    id: A
    coords: [-2, 0]
  - op: point
    id: B
    coords: [2, 0]
example:
  mode: abstract
  construction:
    - op: segment
      id: seg_AB
      endpoints: [A, B]
    - op: perpendicular_bisector
      id: l
      of: [A, B]
      mid: M
      # Do NOT add visible: false — the line renders as a TikZ line by default.
      # This is correct for prompts like "draw the perpendicular bisector".
  annotations:
    auto_draw_all: true
    auto_label_points: true
    marks:
      - kind: mark_equal_lengths
        segments: [[A, M], [M, B]]
        group: 1
notes:
  - "CRITICAL: always define A and B as explicit point ops before using them in segment or perpendicular_bisector ops."
  - "The perpendicular_bisector op defines line l through midpoint M, perpendicular to AB."
  - "Do NOT use visible: false — this hides the line and causes the 'required_entities: line' check to fail."
  - "M is automatically created at the midpoint via the 'mid' field; do not define M separately."
  - "For a triangle circumcenter: add three perpendicular_bisector ops (one per side) and intersect them."
  - "Do NOT use point_along with 'from: M' and 'toward: M' — that makes direction undefined. If you need a point on the bisector, use a different reference point (e.g., 'toward: A')."
