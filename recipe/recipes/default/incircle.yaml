name: incircle
description: "Inscribed circle tangent to all three sides of a triangle"
tags: [triangle, circle, incenter, basic]
context: "Given a triangle T with vertices A, B, C."
setup:
  - op: triangle
    id: T
    vertices: [A, B, C]
    spec:
      angle_A: 60
      angle_B: 70
      side_AB: 4
example:
  mode: abstract
  construction:
    - op: incircle
      id: ic
      of: T
      center: I
  annotations:
    auto_draw_all: true
    auto_label_points: true
notes:
  - "To find where the incircle touches a specific side (e.g. BC), first define that side as a named segment: {op: segment, id: seg_BC, endpoints: [B, C]}. Then use point_foot: {op: point_foot, id: T, source: I, onto: seg_BC}"
  - "CRITICAL: point_foot requires a segment/line/ray as 'onto' — it CANNOT take a Triangle id. Always pass a segment id, not the triangle id"
  - "CRITICAL — mark_right_angle at tangent points: the incenter O is a free interior point, not a segment endpoint. Do not use O as a ray origin in mark_right_angle. Instead mark the right angle at the tangent point itself, using the tangent point and the two adjacent vertices: e.g. mark_right_angle(a=B, vertex=T_BC, b=O) where T_BC is the foot of perpendicular from O to side BC."
  - "When the problem gives triangle constraints that are mutually inconsistent with a requested angle label, use label_only: true on mark_angle to draw the arc and text without asserting geometric correctness."
