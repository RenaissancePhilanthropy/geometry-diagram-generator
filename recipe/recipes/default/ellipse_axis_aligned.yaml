name: ellipse_axis_aligned
description: "Axis-aligned ellipse on a Cartesian coordinate system with labeled center"
tags: [ellipse, cartesian, coordinates, analytic_geometry]
context: "A Cartesian coordinate system with an axis-aligned ellipse."
setup: []
example:
  mode: grid
  construction:
    - op: canvas
      id: canvas
      x_range: [-1, 4]
      y_range: [0, 8]
      axes: true
      grid: true
    - op: point
      id: O
      coords: [1, 3]
    - op: ellipse
      id: E
      center: O
      hradius: 1.5
      vradius: 2
  annotations:
    auto_draw_all: true
    auto_label_points: false
    labels:
      - kind: label_point
        point: O
        text: "(1, 3)"
        pos: below right
notes:
  - "Use hradius = (horizontal axis length) / 2, vradius = (vertical axis length) / 2"
  - "For 'horizontal axis length 3': hradius = 1.5; for 'vertical axis length 4': vradius = 2"
  - "Set axes: true and grid: true on the canvas for Cartesian coordinate system prompts"
  - "Label the center using annotations.labels with kind: label_point and the coordinate text"
  - "Use show_coords: true on label_point to append the computed (x,y) coordinate automatically rather than hardcoding it in the text field."
