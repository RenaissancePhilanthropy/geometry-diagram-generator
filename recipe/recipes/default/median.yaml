name: median
description: "Segment from a vertex to the midpoint of the opposite side"
tags: [triangle, midpoint, segment, basic]
context: "Given a triangle T with vertices A, B, C."
setup:
  - op: triangle
    id: T
    vertices: [A, B, C]
    spec:
      angle_A: 60
      angle_B: 70
      side_AB: 4
example:
  mode: abstract
  construction:
    - op: median
      id: med_A
      from_vertex: A
      triangle: T
      mid: M_BC
  annotations:
    auto_draw_all: true
    auto_label_points: true
notes:
  - "When the problem gives triangle constraints that are mutually inconsistent with a requested angle label, use label_only: true on mark_angle to draw the arc and text without asserting geometric correctness."
