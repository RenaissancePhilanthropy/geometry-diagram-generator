name: cyclic_quadrilateral
description: "Quadrilateral with all four vertices on a circle"
tags: [circle, polygon, cyclic, intermediate]
context: "Given a circle c with center O."
setup:
  - op: point
    id: O
    coords: [2, 2]
  - op: circle
    id: c
    center: O
    radius: 2
example:
  mode: grid
  construction:
    - op: point
      id: A
      coords: [4, 2]
    - op: rotation
      id: B
      point: A
      center: O
      angle: 75
    - op: rotation
      id: C
      point: A
      center: O
      angle: 160
    - op: rotation
      id: D
      point: A
      center: O
      angle: 250
    - op: polygon
      id: quad
      vertices: [A, B, C, D]
  annotations:
    auto_draw_all: true
    auto_label_points: true
notes:
  - "Place A explicitly on the circle (e.g. at the rightmost point: coords = [center_x + radius, center_y]), then rotate A around O to get B, C, D"
  - "rotation guarantees all points are EXACTLY equidistant from O — never use hardcoded coordinates for B, C, D"
  - "Choose non-uniform rotation angles (e.g. 75, 160, 250 degrees) so the quadrilateral is visibly non-regular and non-rectangular"
  - "Opposite angles of a cyclic quadrilateral sum to 180 degrees"
