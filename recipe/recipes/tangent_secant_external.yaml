name: tangent_secant_external
description: "From an external point, one tangent to a circle and one secant passing through two points on the circle"
tags: [circle, tangent, secant, external-point, intermediate]
context: "Given a circle c with center O and an external point P."
setup:
  - op: point
    id: O
    coords: [0, 0]
  - op: point
    id: P
    coords: [5, 0]
  - op: circle
    id: c
    center: O
    radius: 2
example:
  mode: grid
  construction:
    - op: point
      id: O
      coords: [0, 0]
    - op: circle
      id: c
      center: O
      radius: 2
    - op: point
      id: P
      coords: [5, 0]
    - op: tangent_line
      id: t1
      circle: c
      from_point: P
      selector:
        kind: upper_of_line
        a: O
        b: P
      visible: false
    - op: intersection
      id: T
      of: [t1, c]
      selector:
        kind: upper_of_line
        a: O
        b: P
    - op: segment
      id: seg_PT
      endpoints: [P, T]
    - op: point
      id: secant_dir
      coords: [-1, 1]
      visible: false
    - op: line_through
      id: secant_line
      points: [P, secant_dir]
      visible: false
    - op: intersection
      id: A
      of: [secant_line, c]
      selector:
        kind: closest_to
        p: P
    - op: intersection
      id: B
      of: [secant_line, c]
      selector:
        kind: closest_to
        p: secant_dir
    - op: segment
      id: seg_PA
      endpoints: [P, A]
    - op: segment
      id: seg_AB
      endpoints: [A, B]
  annotations:
    auto_draw_all: true
    auto_label_points: true
notes:
  - "secant_dir MUST be placed inside the circle (distance from O < radius) — this guarantees the line through P and secant_dir intersects the circle at two points. Example: O=(0,0) r=2, so secant_dir=(-1,1) works since sqrt(1+1)=1.41 < 2"
  - "Use closest_to(P) for A (nearer intersection) and closest_to(secant_dir) for B (farther intersection). Do NOT use opposite_side for the second intersection point — it fails when both points are on the same side of the line"
  - "Draw the secant as two segments: P→A and A→B (not as a single line)"
  - "The tangent line should be visible: false; draw it as segment P→T instead"
