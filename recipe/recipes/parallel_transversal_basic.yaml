name: parallel_transversal_basic
description: "Two parallel lines AB and CD cut by a transversal, with intersection points G and H — no angle marks"
tags: [parallel, transversal, basic]
context: "Given points A, B on the first line and C, D on the second line."
setup:
  - op: point
    id: A
    coords: [0, 0]
  - op: point
    id: B
    coords: [4, 0]
  - op: point
    id: C
    coords: [0, 2]
  - op: point
    id: D
    coords: [4, 2]
example:
  mode: grid
  construction:
    - op: line_through
      id: L1
      points: [A, B]
    - op: parallel
      id: L2
      to_line: L1
      through: C
    - op: point
      id: E
      coords: [2, -1]
      visible: false
    - op: point
      id: F
      coords: [3, 3]
      visible: false
    - op: line_through
      id: Trans
      points: [E, F]
    - op: intersection
      id: G
      of: [L1, Trans]
    - op: intersection
      id: H
      of: [L2, Trans]
  annotations:
    auto_draw_all: true
    auto_label_points: true
notes:
  - "Use this recipe for diagrams that only require drawing parallel lines and a transversal — no angle annotations"
  - "L1 (through A, B) and L2 (through C, D) are parallel; Trans (through E, F) is the transversal"
  - "D is placed at (4,2) to lie on L2, giving the standard 'parallel lines AB and CD' naming"
  - "Transversal guide points (E, F) must be visible: false — only G and H appear as intersection points"
  - "For a diagram that also marks angle pairs, use the parallel_transversal_angles recipe instead"
