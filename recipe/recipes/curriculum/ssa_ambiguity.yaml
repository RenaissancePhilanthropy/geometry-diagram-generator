name: ssa_ambiguity
description: "SSA ambiguity diagram: given angle A and sides AB and BC, a circle from B shows two possible triangle positions"
tags: [triangle, congruence, ambiguity, SSA, circle, intermediate]
context: "No prior objects. Shows why SSA does not guarantee triangle congruence."
setup: []
example:
  mode: grid
  construction:
    - op: point
      id: A
      coords: [0, 0]
    # B is along the base ray from A
    - op: point
      id: B
      coords: [8, 0]
    # Direction point for the second ray from A at 40°
    - op: point
      id: ray_dir
      coords: [0.766, 0.643]
      visible: false
    # The second ray from A — long line to show it extends beyond both intersections
    - op: point
      id: ray_far
      coords: [9.0, 7.55]
      visible: false
    - op: segment
      id: seg_ray
      endpoints: [A, ray_far]
    # Circle centered at B with radius 6 (> AB·sin(40°) ≈ 5.14, guaranteeing two intersections)
    - op: circle
      id: circ_B
      center: B
      radius: 6
    # C1: acute case — nearer intersection (t ≈ 3.04)
    - op: point
      id: C1
      coords: [2.33, 1.95]
    # C2: obtuse case — farther intersection (t ≈ 9.22)
    - op: point
      id: C2
      coords: [7.07, 5.93]
    # Triangle 1: acute — A, B, C1
    - op: segment
      id: seg_BC1
      endpoints: [B, C1]
    # Triangle 2: obtuse — A, B, C2
    - op: segment
      id: seg_BC2
      endpoints: [B, C2]
    # Base segment AB
    - op: segment
      id: seg_AB
      endpoints: [A, B]
  annotations:
    auto_draw_all: true
    auto_label_points: true
    marks:
      - kind: mark_angle
        a: B
        vertex: A
        b: ray_far
        group: 1
      - kind: mark_equal_lengths
        segments: [[B, C1], [B, C2]]
        group: 1
notes:
  - "CRITICAL: choose radius > AB·sin(angle_A) to guarantee two intersections. Here AB=8, angle_A=40°, so min_radius ≈ 5.14. Use radius 6."
  - "C1 and C2 are computed from the ray-circle intersection: A + t·(cos40°,sin40°) for t≈3.04 (acute) and t≈9.22 (obtuse)."
  - "Do NOT use an 'intersection' op with a 'beyond' selector for C1/C2 — if radius is too small the op will fail. Use explicit coords."
  - "ray_far is placed far along the 40° ray so the segment A→ray_far passes through both C1 and C2 and extends beyond."
  - "seg_BC1 and seg_BC2 are both radii of circ_B, so BC1 = BC2 = 6. Mark them equal with tick marks."
  - "The two possible triangles ABC1 (acute at C1) and ABC2 (obtuse at C2) share the same angle A and side lengths AB and BC."
  - "Optional: mark AC1 and AC2 with different labels to show the two possible side lengths for the remaining side."
