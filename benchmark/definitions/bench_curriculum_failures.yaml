- id: geo-m1-t4-l3-bridge-indirect-measurement-1
  prompt: 'Draw a river-crossing indirect measurement diagram. Show a horizontal river
    with two banks. On the top bank label two points: A (at the edge of the river)
    and B (further from the river). On the bottom bank label point C directly across
    from A. Draw triangle ABC where AB goes inland and BC is the width of the river
    — that''s the unknown length. Now extend segment CA past A to a point D on the
    same bank as B, so that A is between C and D. Also mark point E on the bottom
    bank so that triangle DAE is on the land side. Mark CA = DA (one tick each) and
    angle CAB = angle DAE as vertical angles (one arc each), and AB = AE (two ticks
    each). This sets up SAS congruence so DE = BC.'
