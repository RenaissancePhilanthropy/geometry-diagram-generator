id: bench_core
shared_rubric:
  - id: labels_readable
    text: "Are all labels readable and non-overlapping?"
    category: visual_quality
  - id: well_proportioned
    text: "Is the diagram well-proportioned (not too cramped or sparse)?"
    category: visual_quality
  - id: no_clipping
    text: "Are all elements fully visible (nothing clipped at edges)?"
    category: visual_quality

prompts:
  - id: right-triangle
    prompt: "Draw a right triangle ABC with the right angle at B."
    reference_svg: right-triangle.svg
    tier: 1
    tags: [triangle, right-angle]
    rubric:
      - id: angle_B_90
        text: "Is angle B visually a right angle?"
      - id: vertices_labeled
        text: "Are all three vertices A, B, C labeled?"
      - id: right_angle_mark
        text: "Is the right angle at B marked with a square symbol?"

  - id: midpoint-segment
    prompt: "Draw segment AB and mark its midpoint M."
    tier: 1
    tags: [midpoint, segment]
    rubric:
      - id: midpoint_marked
        text: "Is the midpoint M marked visibly on the segment?"
      - id: midpoint_labeled
        text: "Is the midpoint labeled M?"
      - id: endpoints_labeled
        text: "Are both endpoints A and B labeled?"

  - id: circle-inscribed-triangle
    prompt: "Draw a triangle PQR with its inscribed circle (incircle) tangent to all three sides."
    reference_svg: null
    tier: 2
    tags: [triangle, circle, incircle]
    rubric:
      - id: circle_present
        text: "Is a circle drawn inside the triangle?"
      - id: tangent_to_all_sides
        text: "Does the circle appear tangent to all three sides (touching each side at one point)?"
      - id: triangle_labeled
        text: "Are all three vertices P, Q, R labeled?"
