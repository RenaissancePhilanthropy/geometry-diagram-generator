- id: Mathematics_69
  prompt: 'Geometry construction task: Draw an isosceles trapezoid ABCD with AB parallel
    to CD and AB > CD. Place A at the bottom-left, B at the bottom-right, D at the
    top-left, and C at the top-right so that AB is the lower base and CD the upper
    base. Add an interior point and connect it to points A, B, C, and D with line
    segments. These four segments must partition the trapezoid into four triangles
    whose areas, starting from the triangle adjacent to base CD and proceeding clockwise,
    are in the ratios 2:3:4:5 (i.e., smallest at the top near CD, then right, then
